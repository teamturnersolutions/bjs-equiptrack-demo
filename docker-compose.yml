services:
  postgres:
    image: postgres:16-alpine
    container_name: equiptrack-db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=equiptrack
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgrespassword
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d equiptrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    image: teamturnersolutions/equiptrack:prodv3
    ports:
      - "9002:9002"
    volumes:
      - ./prisma:/app/prisma
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/equiptrack?schema=public
      - NODE_ENV=production
      - TZ=America/New_York
      - NEXTAUTH_SECRET=bjs-equiptrack-enterprise-secret-2026-key
      - NEXTAUTH_URL=http://localhost:9002
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
